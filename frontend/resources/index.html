<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PewPaw</title>
<link rel="stylesheet" href="qrc:/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login screen -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">PewPaw</div>
    <p class="login-subtitle">WhatsApp client for desktop</p>
    <div id="qr-container">
      <div id="qr-placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="9" y2="15"/><line x1="15" y1="9" x2="15" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
        <span>Scan to link device</span>
      </div>
      <canvas id="qr-canvas" style="display:none"></canvas>
    </div>
    <button id="btn-login" class="btn-primary">Request QR Code</button>
    <p id="login-status" class="status-text"></p>
  </div>
</div>

<!-- Main app -->
<div id="page-main" class="page">

  <!-- Sidebar -->
  <aside id="sidebar">
    <header class="sidebar-header">
      <h1 class="sidebar-title">PewPaw</h1>
      <div class="sidebar-actions">
        <button id="btn-compose" class="btn-icon" title="New chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button id="btn-logout" class="btn-icon" title="Log out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>
    <div id="connection-status" class="bar-connected">Connected</div>
    <div id="chat-list"></div>
  </aside>

  <!-- Main area -->
  <main id="main-area">
    <div id="welcome-screen" class="welcome">
      <div class="welcome-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
      <h2>Select a chat</h2>
      <p>Choose a conversation from the sidebar or start a new one</p>
    </div>

    <div id="chat-view" style="display:none">
      <header id="chat-header" class="chat-header"></header>
      <div id="message-list"></div>
      <div id="reply-banner" class="reply-banner" style="display: none;">
        <div class="reply-content">
            <span class="reply-icon">↰</span>
            <span id="reply-text">Replying to...</span>
        </div>
        <button id="btn-cancel-reply" class="btn-cancel-reply" onclick="cancelReply()">✕</button>
      </div>
      <footer class="chat-input-bar">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        <button id="btn-send" class="btn-send" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </footer>
    </div>
  </main>

  <!-- Compose Modal -->
  <div id="compose-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <h3>New Chat</h3>
      <p>Enter a phone number with country code (e.g., 6281234567890)</p>
      <div class="input-group">
        <input type="text" id="compose-input" placeholder="628..." autocomplete="off">
      </div>
      <div class="modal-actions">
        <button id="btn-compose-cancel" class="btn-secondary">Cancel</button>
        <button id="btn-compose-start" class="btn-primary">Start Chat</button>
      </div>
    </div>
  </div>

</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="qrc:/js/app.js"></script>
</body>
</html>
